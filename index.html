<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bản đồ địa điểm lịch sử Việt Nam</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Historical Map MVP</p>
      <h1>Bản đồ địa điểm lịch sử Việt Nam</h1>
    </div>
    <div class="header-actions">
      <button id="manageTopicsBtn" class="ghost-light-btn">Quản lý chủ đề</button>
      <button id="manageTypesBtn" class="ghost-light-btn">Quản lý loại</button>
      <button id="addPlaceBtn" class="primary-btn">+ Thêm địa điểm</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <div class="section-title">
          <h2>Chủ đề</h2>
          <button id="quickAddTopicBtn" class="tiny-btn">+ Thêm</button>
        </div>
        <div id="topicList" class="topic-list"></div>
      </section>

      <section class="panel controls">
        <input id="searchInput" type="search" placeholder="Tìm địa điểm, nhân vật, địa chỉ..." />
        <select id="typeFilter"></select>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Địa điểm đã đánh dấu</h2>
          <button id="resetBtn" class="ghost-btn">Hiện tất cả</button>
        </div>
        <div id="placeList" class="place-list"></div>
      </section>
    </aside>

    <section class="map-area">
      <div id="map"></div>
      <div id="detailPanel" class="detail-panel hidden"></div>
    </section>
  </main>

  <dialog id="placeDialog">
    <form id="placeForm" class="modal-form">
      <div class="modal-header">
        <h2 id="placeFormTitle">Thêm địa điểm</h2>
        <button type="button" data-close="placeDialog" class="icon-btn">×</button>
      </div>
      <input type="hidden" id="placeId" />
      <label>Tên địa điểm <input id="placeName" required /></label>
      <label>Chủ đề liên quan <select id="placeTopics" multiple required></select></label>
      <label>Loại địa điểm <select id="placeType" required></select></label>
      <label>Địa chỉ <input id="placeAddress" required /></label>
      <div class="form-grid">
        <label>Latitude <input id="placeLat" type="number" step="any" required /></label>
        <label>Longitude <input id="placeLng" type="number" step="any" required /></label>
      </div>
      <label>Google Maps URL <input id="placeGoogleUrl" placeholder="Không bắt buộc" /></label>
      <label>Mô tả <textarea id="placeDescription" rows="3"></textarea></label>
      <label>Ghi chú <textarea id="placeNote" rows="2"></textarea></label>
      <div class="modal-actions">
        <button type="button" data-close="placeDialog" class="ghost-btn">Huỷ</button>
        <button type="submit" class="primary-btn">Lưu địa điểm</button>
      </div>
    </form>
  </dialog>

  <dialog id="topicDialog">
    <form id="topicForm" class="modal-form small-form">
      <div class="modal-header">
        <h2 id="topicFormTitle">Thêm chủ đề</h2>
        <button type="button" data-close="topicDialog" class="icon-btn">×</button>
      </div>
      <input type="hidden" id="topicId" />
      <label>Tên chủ đề <input id="topicName" required placeholder="Ví dụ: Trần Hưng Đạo" /></label>
      <label>Nhóm chủ đề
        <select id="topicCategory">
          <option value="person">Nhân vật</option>
          <option value="event">Sự kiện</option>
          <option value="battle">Trận chiến</option>
          <option value="dynasty">Triều đại</option>
          <option value="other">Khác</option>
        </select>
      </label>
      <label>Mô tả <textarea id="topicDescription" rows="3"></textarea></label>
      <div class="modal-actions">
        <button type="button" data-close="topicDialog" class="ghost-btn">Huỷ</button>
        <button type="submit" class="primary-btn">Lưu chủ đề</button>
      </div>
    </form>
  </dialog>

  <dialog id="typeDialog">
    <form id="typeForm" class="modal-form small-form">
      <div class="modal-header">
        <h2 id="typeFormTitle">Thêm loại địa điểm</h2>
        <button type="button" data-close="typeDialog" class="icon-btn">×</button>
      </div>
      <input type="hidden" id="typeId" />
      <label>Tên loại <input id="typeName" required placeholder="Ví dụ: Đền thờ" /></label>
      <label>Mã loại <input id="typeValue" required placeholder="Ví dụ: temple" /></label>
      <p class="hint">Mã loại chỉ nên dùng chữ thường, số và dấu gạch ngang. Khi sửa mã loại, các địa điểm đang dùng loại này sẽ được cập nhật theo.</p>
      <div class="modal-actions">
        <button type="button" data-close="typeDialog" class="ghost-btn">Huỷ</button>
        <button type="submit" class="primary-btn">Lưu loại</button>
      </div>
    </form>
  </dialog>

  <dialog id="managerDialog">
    <div class="manager modal-form">
      <div class="modal-header">
        <h2 id="managerTitle">Quản lý</h2>
        <button type="button" data-close="managerDialog" class="icon-btn">×</button>
      </div>
      <div id="managerContent" class="manager-list"></div>
    </div>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
