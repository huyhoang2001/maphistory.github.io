<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bản đồ địa điểm lịch sử Việt Nam</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Historical Map MVP</p>
      <h1>Bản đồ địa điểm lịch sử Việt Nam</h1>
    </div>
    <button id="addPlaceBtn" class="primary-btn">+ Thêm địa điểm</button>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Chủ đề</h2>
        <div id="topicList" class="topic-list"></div>
      </section>

      <section class="panel controls">
        <input id="searchInput" type="search" placeholder="Tìm địa điểm, nhân vật, địa chỉ..." />
        <select id="typeFilter">
          <option value="all">Tất cả loại địa điểm</option>
          <option value="temple">Đền thờ</option>
          <option value="statue">Tượng đài</option>
          <option value="relic">Di tích</option>
          <option value="museum">Bảo tàng</option>
          <option value="battlefield">Chiến trường</option>
          <option value="street">Đường phố</option>
          <option value="school">Trường học</option>
          <option value="other">Khác</option>
        </select>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>Địa điểm đã đánh dấu</h2>
          <button id="resetBtn" class="ghost-btn">Hiện tất cả</button>
        </div>
        <div id="placeList" class="place-list"></div>
      </section>
    </aside>

    <section class="map-area">
      <div id="map"></div>
      <div id="detailPanel" class="detail-panel hidden"></div>
    </section>
  </main>

  <dialog id="placeDialog">
    <form id="placeForm" method="dialog" class="place-form">
      <div class="modal-header">
        <h2 id="formTitle">Thêm địa điểm</h2>
        <button type="button" id="closeDialogBtn" class="icon-btn">×</button>
      </div>

      <input type="hidden" id="placeId" />
      <label>Tên địa điểm <input id="placeName" required /></label>
      <label>Chủ đề liên quan
        <select id="placeTopics" multiple required></select>
      </label>
      <label>Loại địa điểm
        <select id="placeType" required>
          <option value="temple">Đền thờ</option>
          <option value="statue">Tượng đài</option>
          <option value="relic">Di tích</option>
          <option value="museum">Bảo tàng</option>
          <option value="battlefield">Chiến trường</option>
          <option value="street">Đường phố</option>
          <option value="school">Trường học</option>
          <option value="other">Khác</option>
        </select>
      </label>
      <label>Địa chỉ <input id="placeAddress" required /></label>
      <div class="form-grid">
        <label>Latitude <input id="placeLat" type="number" step="any" required /></label>
        <label>Longitude <input id="placeLng" type="number" step="any" required /></label>
      </div>
      <label>Google Maps URL <input id="placeGoogleUrl" placeholder="Không bắt buộc" /></label>
      <label>Mô tả <textarea id="placeDescription" rows="3"></textarea></label>
      <label>Ghi chú <textarea id="placeNote" rows="2"></textarea></label>

      <div class="modal-actions">
        <button type="button" id="cancelBtn" class="ghost-btn">Huỷ</button>
        <button type="submit" class="primary-btn">Lưu</button>
      </div>
    </form>
  </dialog>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
